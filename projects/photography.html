<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Photography — Alma Rachel Ipe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--black:#1a1a1a;--white:#ffffff;--grey:#f0f0ee;--mid:#999;--serif:'Cormorant Garamond',serif;--sans:'Inter',sans-serif;--pad:40px;--gap:10px;}
html{scroll-behavior:smooth;}
body{background:var(--white);color:var(--black);font-family:var(--sans);font-weight:300;font-size:13.5px;line-height:1.85;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
img{display:block;width:100%;object-fit:cover;}
.proj-nav{position:sticky;top:0;background:var(--white);z-index:400;display:flex;justify-content:space-between;align-items:center;padding:20px var(--pad);border-bottom:1px solid #ebebeb;}
.proj-back{font-size:11px;letter-spacing:0.08em;color:var(--black);transition:opacity 0.2s;text-decoration:none;display:flex;align-items:center;gap:6px;}
.proj-back:hover{opacity:0.5;}
.proj-site-name{font-family:var(--serif);font-weight:300;font-size:16px;letter-spacing:0.04em;}
.det-tag{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--mid);}
.det-h1{font-family:var(--serif);font-weight:300;font-size:40px;line-height:1.05;letter-spacing:0.01em;}
.det-sub{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--mid);margin-top:6px;}
.det-body{font-size:12px;line-height:1.95;color:#444;}
.det-section{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--black);font-weight:400;}
.px{padding:0 var(--pad);}
.mb8{margin-bottom:8px;}.mb16{margin-bottom:16px;}.mb24{margin-bottom:24px;}.mb32{margin-bottom:32px;}.mb40{margin-bottom:40px;}.mb48{margin-bottom:48px;}.mb64{margin-bottom:64px;}.mb0{margin-bottom:0;}
.pb80{padding-bottom:80px;}.pt32{padding-top:32px;}
.fw{width:100%;display:block;object-fit:cover;}
.ph{background:var(--grey);display:flex;align-items:center;justify-content:center;color:#bbb;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;}
.sq{aspect-ratio:1;}.r43{aspect-ratio:4/3;}.r34{aspect-ratio:3/4;}.r23{aspect-ratio:2/3;}.r169{aspect-ratio:16/9;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--gap);}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gap);}
.cap{font-size:10px;color:var(--mid);letter-spacing:0.05em;line-height:1.5;}
.stripe-block{height:48px;background:#7dcfed;margin-bottom:var(--gap);display:flex;align-items:center;padding:0 12px;}
.swatch{background:#7dcfed;aspect-ratio:1;}
.rule{border:none;border-top:1px solid #ddd;margin:0;}
.det-next{border-top:1px solid #ebebeb;padding:48px var(--pad) 80px;display:flex;justify-content:space-between;align-items:center;}
.next-sm{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--mid);margin-bottom:8px;}
.next-nm{font-family:var(--serif);font-weight:300;font-size:24px;transition:opacity 0.2s;text-decoration:none;display:block;}
.next-nm:hover{opacity:0.5;}
.next-ar{font-size:22px;transition:transform 0.2s;text-decoration:none;}
.next-ar:hover{transform:translateX(5px);}
@media(max-width:768px){:root{--pad:24px;}.det-h1{font-size:26px;}.g2,.g3,.g4{grid-template-columns:1fr 1fr;}.det-next{padding:40px 24px 60px;}}</style>
</head>
<body>

  <div style="display:flex;flex-direction:column;gap:10px;"><div class="ph r43">C 1</div><div class="ph r43">C 2</div><div class="ph r43">C 3</div></div>
  <div style="display:flex;flex-direction:column;gap:10px;"><div class="ph" style="aspect-ratio:3/4;">R top</div><div class="ph r43">R bot</div></div>
</div>

</body>
</html>
